<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique Elegance | Catálogo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="header">
        <h1>BOUTIQUE ELEGANCE</h1>
        <p class="subtitle">ALTA COSTURA & PEDIDOS EXCLUSIVOS</p>
    </div>

    <div class="container" id="gallery"></div>

    <!-- Modal del Producto -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
        
            <div class="modal-grid">
                <!-- Columna Izquierda: Imagen con Lupa -->
                <div class="image-section">
                    <div class="zoom-wrapper">
                        <img id="modalImg" src="" alt="Producto">
                        <div class="zoom-lens"></div>
                    </div>
                </div>

                <!-- Columna Derecha: Información y Zoom Fijo -->
                <div class="details-panel">
                    <div class="product-info-box">
                        <h2 id="modalName">Nombre del Producto</h2>
                        <p id="modalPrice" class="price-detail">$0.00</p>
                        <hr class="divider">
                    
                        <div class="selection-group">
                            <label>TALLES</label>
                            <p id="modalSizes" class="sizes-text">S, M, L</p>
                        </div>

                        <a id="btnWhatsapp" href="#" target="_blank" class="buy-btn">
                            CONSULTAR DISPONIBILIDAD
                        </a>
                    </div>

                    <!-- El cuadro de detalle aparecerá aquí abajo -->
                    <div id="zoomResult" class="zoom-result"></div>
                </div>
            </div>
        </div>
    </div>    
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique Elegance | Catálogo Exclusivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="header">
        <h1>BOUTIQUE ELEGANCE</h1>
        <p class="subtitle">ALTA COSTURA & PEDIDOS EXCLUSIVOS</p>
    </div>

    <div class="container" id="gallery">
        <!-- Los productos se cargan dinámicamente aquí -->
    </div>

    <!-- Modal de Detalle de Producto -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="document.getElementById('productModal').style.display='none'">&times;</span>
            
            <div class="modal-grid">
                <div class="zoom-container">
                    <img id="modalImg" src="" alt="Vista de prenda">
                </div>
                
                <div class="details-panel">
                    <h2 id="modalName"></h2>
                    <p id="modalPrice" class="price-detail"></p>
                    <hr class="divider">
                    
                    <div class="selection-group">
                        <label>COLORES DISPONIBLES</label>
                        <div id="modalColors" class="color-selector"></div>
                    </div>

                    <div class="selection-group">
                        <label>TALLES</label>
                        <p id="modalSizes" class="sizes-text"></p>
                    </div>

                    <a id="btnWhatsapp" href="#" target="_blank" class="buy-btn">
                        SOLICITAR POR WHATSAPP
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
